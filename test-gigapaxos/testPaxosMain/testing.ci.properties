# CI variant of testing.properties for TESTPaxosMain.
# Tuned for a quick correctness pass (RSM invariant) rather than throughput,
# so the full testWithRecovery() flow (two paxos runs + recovery) finishes
# well under the hardcoded 250s JUnit timeout in TESTPaxosMain.

NUM_GROUPS=1
NUM_GROUPS_CLIENT=1
GROUP_SIZE=3
NUM_NODES=1
NUM_REQUESTS=20000
TOTAL_LOAD=4000
NUM_CLIENTS=4
MAX_RESPONSE_WAIT_TIME=60000

PROBE_INIT_LOAD=4000

CLIENT_BINARY=gigapaxos.testing.TESTPaxosClient
CMD_OPTIONS=-c
