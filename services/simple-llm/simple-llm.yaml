---
name: simple-llm
components:
   - ollama:
        image: fadhilkurnia/xdn-llama:latest
        expose: 11434
        stateful: false
   - mongodb:
        image: mongo:8.0
        expose: 27017
        stateful: true
   - server:
        image: fadhilkurnia/xdn-simple-llm:latest
        stateful: false
        port: 3000
        entry: true
state: mongodb:/data/db/
deterministic: false
consistency: linearizability
