services:
  node1:
    build: .
    ports:
      - "8001:80"
    environment:
      - NODE_ID=node1
      - RAFT_ADDR=0.0.0.0:7000
      - RAFT_PEERS=node1=node1:7000,node2=node2:7000,node3=node3:7000
      - RAFT_DIR=/app/raft-data
      - DB_PATH=/app/data
    volumes:
      - node1-raft:/app/raft-data
      - node1-data:/app/data

  node2:
    build: .
    ports:
      - "8002:80"
    environment:
      - NODE_ID=node2
      - RAFT_ADDR=0.0.0.0:7000
      - RAFT_PEERS=node1=node1:7000,node2=node2:7000,node3=node3:7000
      - RAFT_DIR=/app/raft-data
      - DB_PATH=/app/data
    volumes:
      - node2-raft:/app/raft-data
      - node2-data:/app/data

  node3:
    build: .
    ports:
      - "8003:80"
    environment:
      - NODE_ID=node3
      - RAFT_ADDR=0.0.0.0:7000
      - RAFT_PEERS=node1=node1:7000,node2=node2:7000,node3=node3:7000
      - RAFT_DIR=/app/raft-data
      - DB_PATH=/app/data
    volumes:
      - node3-raft:/app/raft-data
      - node3-data:/app/data

volumes:
  node1-raft:
  node1-data:
  node2-raft:
  node2-data:
  node3-raft:
  node3-data:
