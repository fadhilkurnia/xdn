---
name: "svc"
image: "fadhilkurnia/xdn-bookcatalog"
port: 80
state: /app/data/
consistency: linearizability
deterministic: true
requests:
  - path_prefix: "/api/books/"
    methods: "PUT"
    behavior: key_commutative
  - path_prefix: "/"
    methods: "GET,HEAD,OPTIONS,TRACE"
    behavior: read_only
  - path_prefix: "/"
    methods: "DELETE"
    behavior: write_only
  - path_prefix: "/"
    methods: "POST,PATCH"
    behavior: read_modify_write
