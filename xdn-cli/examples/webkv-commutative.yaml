---
name: "svc"
image: "fadhilkurnia/xdn-webkv"
port: 80
state: /app/data/
consistency: linearizability
deterministic: true
environments:
  - ENABLE_WAL: "true"
requests:
  - path_prefix: "/api/kv/"
    methods: "POST,PUT,DELETE"
    behavior: key_commutative
  - path_prefix: "/"
    methods: "GET,HEAD,OPTIONS,TRACE"
    behavior: read_only
