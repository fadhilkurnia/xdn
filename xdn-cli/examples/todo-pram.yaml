---
name: "todo-pram"
image: "fadhilkurnia/xdn-todo"
state: /app/data/
port: 80
consistency: pram
deterministic: true
num_replicas: 5
environments:
  - ENABLE_WAL: "true"

requests:
  - path_prefix: "/"
    methods: "GET,OPTIONS,HEAD"
    behavior: read_only
  - path_prefix: "/"
    methods: "POST,DELETE"
    behavior: write_only
  - path_prefix: "/"
    methods: "POST,DELETE"
    behavior: monotonic
