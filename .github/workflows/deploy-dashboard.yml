name: Deploy XDN dashboard to GitHub Pages

# Publishes the static dashboard/ directory to GitHub Pages. The dashboard is a
# stateless client-side app (no build step), so we just upload the folder.
on:
  push:
    branches: [main, xdn-dashboard]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch: {}

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Serve the dashboard folder as the site root; index.html becomes "/".
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
